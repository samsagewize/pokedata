<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PokeData • Your Pokedex</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: system-ui, sans-serif; }
    .pokemon-sprite { width: 90px; height: 90px; object-fit: contain; transition: all 0.4s; }
    .pokemon-sprite:hover { transform: scale(1.2) rotate(10deg); }
    .set-badge { transition: all 0.3s; cursor: pointer; }
    .set-badge.mastered { background-color: #facc15; color: black; box-shadow: 0 0 25px #facc15; transform: scale(1.08); }
    .card-img { transition: transform 0.3s; }
    .card-img:hover { transform: scale(1.08); }
  </style>
</head>
<body class="bg-gradient-to-br from-gray-950 via-indigo-950 to-gray-950 text-white min-h-screen">

  <div class="max-w-6xl mx-auto p-4">
    <!-- Header -->
    <header class="flex justify-between items-center mb-8 bg-black/50 backdrop-blur-md p-4 rounded-3xl border border-yellow-400/30">
      <div class="flex items-center gap-4">
        <div id="profileAvatar" class="w-16 h-16 bg-gray-800 rounded-2xl flex items-center justify-center overflow-hidden border-4 border-yellow-400"></div>
        <div>
          <h1 id="trainerNameHeader" class="text-3xl font-bold text-yellow-400">Trainer</h1>
          <p id="welcomeText" class="text-sm text-gray-400">Welcome back!</p>
        </div>
      </div>
      <div class="flex gap-3">
        <button onclick="showTab('profile')" class="px-6 py-2 bg-purple-600 hover:bg-purple-700 rounded-2xl text-sm font-medium">Profile</button>
        <button onclick="logout()" class="px-6 py-2 bg-red-600 hover:bg-red-700 rounded-2xl text-sm font-medium">Logout</button>
      </div>
    </header>

    <!-- Tabs -->
    <div class="flex gap-2 mb-8 border-b border-gray-700 pb-2 overflow-x-auto">
      <button onclick="showTab('search')" class="tab-btn active px-6 py-3 font-medium">Search Cards</button>
      <button onclick="showTab('camera')" class="tab-btn px-6 py-3 font-medium">📸 Scan Card</button>
      <button onclick="showTab('collection')" class="tab-btn px-6 py-3 font-medium">My Collection</button>
      <button onclick="showTab('sets')" class="tab-btn px-6 py-3 font-medium">Master Sets</button>
      <button onclick="showTab('profile')" class="tab-btn px-6 py-3 font-medium">👤 Profile</button>
    </div>

    <!-- Profile Tab -->
    <div id="profileTab" class="tab hidden">
      <div class="max-w-2xl mx-auto bg-gray-900/80 backdrop-blur-xl p-10 rounded-3xl border border-yellow-400/20">
        <h2 class="text-3xl font-bold mb-8 text-center">Your Trainer Profile</h2>
        
        <div class="flex flex-col items-center mb-10">
          <div id="bigAvatar" class="w-32 h-32 bg-gray-800 rounded-3xl flex items-center justify-center overflow-hidden border-8 border-yellow-400 mb-6"></div>
          <input id="trainerName" type="text" placeholder="Your Trainer Name" 
            class="w-full max-w-xs p-4 rounded-2xl bg-gray-800 text-center text-2xl font-bold focus:outline-none focus:ring-2 focus:ring-yellow-400">
        </div>

        <div class="mb-8">
          <label class="block text-sm text-gray-400 mb-2">Bio</label>
          <textarea id="bio" rows="4" placeholder="Tell other trainers about yourself... (e.g. I love collecting Charizard cards!)"
            class="w-full p-5 rounded-3xl bg-gray-800 focus:outline-none focus:ring-2 focus:ring-yellow-400"></textarea>
        </div>

        <button onclick="saveProfile()" 
          class="w-full py-5 bg-yellow-400 hover:bg-yellow-300 text-black font-bold text-xl rounded-3xl">
          Save Profile
        </button>

        <div class="mt-12">
          <h3 class="text-xl font-semibold mb-4">Change Starter Companion</h3>
          <div class="grid grid-cols-4 gap-6">
            <div onclick="changeStarter('pikachu')" class="cursor-pointer text-center">
              <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/25.png" class="pokemon-sprite mx-auto" alt="Pikachu">
            </div>
            <div onclick="changeStarter('bulbasaur')" class="cursor-pointer text-center">
              <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/1.png" class="pokemon-sprite mx-auto" alt="Bulbasaur">
            </div>
            <div onclick="changeStarter('charmander')" class="cursor-pointer text-center">
              <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/4.png" class="pokemon-sprite mx-auto" alt="Charmander">
            </div>
            <div onclick="changeStarter('squirtle')" class="cursor-pointer text-center">
              <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/7.png" class="pokemon-sprite mx-auto" alt="Squirtle">
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Master Sets Tab -->
    <div id="setsTab" class="tab hidden">
      <h2 class="text-3xl font-bold mb-6">Master Sets 🏆</h2>
      <p class="text-gray-400 mb-8">Master a set by collecting every card in it. Click a badge when you complete it!</p>
      
      <div id="setsContainer" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6"></div>
    </div>

    <!-- Other tabs (Search, Camera, Collection) remain the same as before -->
    <!-- ... (I kept them compact for space - they are unchanged from last version) ... -->

    <div id="searchTab" class="tab">
      <!-- Search content from previous version -->
      <input id="searchInput" type="text" placeholder="Search any Pokémon card..." 
        class="w-full p-5 rounded-3xl bg-gray-900 text-lg focus:outline-none focus:ring-2 focus:ring-yellow-400" 
        onkeyup="if(event.key==='Enter') searchCards()">
      <button onclick="searchCards()" class="mt-4 px-10 py-4 bg-yellow-400 hover:bg-yellow-300 text-black font-bold rounded-3xl">Search</button>
      <div id="searchResults" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-5 gap-6 mt-10"></div>
    </div>

    <div id="cameraTab" class="tab hidden">
      <div class="bg-black rounded-3xl overflow-hidden border border-gray-700">
        <video id="video" autoplay playsinline class="w-full max-h-96"></video>
      </div>
      <button onclick="takePhoto()" class="mt-6 w-full py-8 bg-green-500 hover:bg-green-400 text-black font-bold text-2xl rounded-3xl">📸 Snap the Card</button>
      <div id="scanResult" class="mt-8"></div>
    </div>

    <div id="collectionTab" class="tab hidden">
      <h2 class="text-2xl font-bold mb-6 flex items-center gap-3">
        My Collection <span id="collectionCount" class="text-sm bg-gray-800 px-3 py-1 rounded-full"></span>
      </h2>
      <div id="myCollection" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-5 gap-6"></div>
    </div>
  </div>

  <script>
    // === DATA ===
    let currentUser = "Trainer";
    let bio = "Aspiring Pokémon Master collecting all the cards!";
    let selectedStarter = localStorage.getItem('starterSprite') || 'pikachu';
    let myCards = JSON.parse(localStorage.getItem('myPokemonCards') || '[]');
    let masteredSets = JSON.parse(localStorage.getItem('masteredSets') || '[]');

    const starters = {
      pikachu: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/25.png",
      bulbasaur: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/1.png",
      charmander: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/4.png",
      squirtle: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/7.png"
    };

    // Main sets (from Pokellector + official sources - main expansions only)
    const allSets = [
      {id: "sv-base", name: "Scarlet & Violet", era: "Scarlet & Violet"},
      {id: "sv-pe", name: "Paldea Evolved", era: "Scarlet & Violet"},
      {id: "sv-of", name: "Obsidian Flames", era: "Scarlet & Violet"},
      {id: "sv-151", name: "Scarlet & Violet - 151", era: "Scarlet & Violet"},
      {id: "sv-pf", name: "Paldean Fates", era: "Scarlet & Violet"},
      {id: "sv-tf", name: "Temporal Forces", era: "Scarlet & Violet"},
      {id: "sv-tm", name: "Twilight Masquerade", era: "Scarlet & Violet"},
      {id: "sv-sf", name: "Shrouded Fable", era: "Scarlet & Violet"},
      {id: "sv-sc", name: "Stellar Crown", era: "Scarlet & Violet"},
      {id: "sv-ss", name: "Surging Sparks", era: "Scarlet & Violet"},
      {id: "sv-pev", name: "Prismatic Evolutions", era: "Scarlet & Violet"},
      {id: "sv-jt", name: "Journey Together", era: "Scarlet & Violet"},
      {id: "sv-bb", name: "Black Bolt", era: "Scarlet & Violet"},
      {id: "sv-wf", name: "White Flare", era: "Scarlet & Violet"},

      {id: "swsh-cz", name: "Crown Zenith", era: "Sword & Shield"},
      {id: "swsh-st", name: "Silver Tempest", era: "Sword & Shield"},
      {id: "swsh-lo", name: "Lost Origin", era: "Sword & Shield"},
      {id: "swsh-ar", name: "Astral Radiance", era: "Sword & Shield"},
      {id: "swsh-br", name: "Brilliant Stars", era: "Sword & Shield"},
      {id: "swsh-fs", name: "Fusion Strike", era: "Sword & Shield"},
      {id: "swsh-es", name: "Evolving Skies", era: "Sword & Shield"},

      {id: "sm-ce", name: "Cosmic Eclipse", era: "Sun & Moon"},
      {id: "sm-hf", name: "Hidden Fates", era: "Sun & Moon"},
      {id: "sm-ub", name: "Unbroken Bonds", era: "Sun & Moon"},
      {id: "sm-up", name: "Ultra Prism", era: "Sun & Moon"},

      {id: "xy", name: "XY Series (Various)", era: "XY"},
      {id: "bw", name: "Black & White Series", era: "Black & White"},
      {id: "base", name: "Base Set", era: "Original"}
    ];

    // === Profile Functions ===
    function updateProfileHeader() {
      document.getElementById('trainerNameHeader').textContent = currentUser;
      document.getElementById('welcomeText').textContent = bio.substring(0, 60) + (bio.length > 60 ? '...' : '');
      
      const avatarHTML = `<img src="${starters[selectedStarter]}" class="w-full h-full object-contain p-2">`;
      document.getElementById('profileAvatar').innerHTML = avatarHTML;
      document.getElementById('bigAvatar').innerHTML = avatarHTML;
    }

    function saveProfile() {
      currentUser = document.getElementById('trainerName').value.trim() || "Trainer";
      bio = document.getElementById('bio').value.trim() || "Aspiring Pokémon Master!";
      localStorage.setItem('trainerName', currentUser);
      localStorage.setItem('bio', bio);
      updateProfileHeader();
      alert("Profile saved! 🎉");
    }

    function changeStarter(key) {
      selectedStarter = key;
      localStorage.setItem('starterSprite', key);
      updateProfileHeader();
    }

    // === Master Sets ===
    function renderMasterSets() {
      const container = document.getElementById('setsContainer');
      container.innerHTML = '';

      allSets.forEach(set => {
        const isMastered = masteredSets.includes(set.id);
        const div = document.createElement('div');
        div.className = `set-badge p-6 bg-gray-900 rounded-3xl text-center ${isMastered ? 'mastered' : ''}`;
        div.innerHTML = `
          <div class="text-4xl mb-3">🏆</div>
          <p class="font-bold text-lg">${set.name}</p>
          <p class="text-xs text-gray-400">${set.era}</p>
        `;
        div.onclick = () => toggleMastered(set.id, div);
        container.appendChild(div);
      });
    }

    function toggleMastered(setId, element) {
      if (masteredSets.includes(setId)) {
        masteredSets = masteredSets.filter(id => id !== setId);
        element.classList.remove('mastered');
      } else {
        masteredSets.push(setId);
        element.classList.add('mastered');
        createConfetti();
      }
      localStorage.setItem('masteredSets', JSON.stringify(masteredSets));
    }

    function createConfetti() {
      for (let i = 0; i < 60; i++) {
        setTimeout(() => {
          const confetti = document.createElement('div');
          confetti.textContent = ['✨','⭐','🔥','⚡'][Math.floor(Math.random()*4)];
          confetti.style.position = 'fixed';
          confetti.style.left = Math.random() * 100 + 'vw';
          confetti.style.top = '-20px';
          confetti.style.fontSize = '20px';
          confetti.style.zIndex = '9999';
          confetti.style.transition = 'all 3s linear';
          document.body.appendChild(confetti);
          
          setTimeout(() => {
            confetti.style.transform = `translateY(${window.innerHeight + 100}px) rotate(${Math.random()*720}deg)`;
            confetti.style.opacity = '0';
          }, 50);
          
          setTimeout(() => confetti.remove(), 3500);
        }, i * 8);
      }
    }

    // === Other functions (search, camera, collection) - same as previous version ===
    // (Search, addToCollection, loadCollection, takePhoto, startCamera, showTab, logout)

    async function searchCards() { /* same as before */ }
    function addToCollection(id, name, image) { /* same */ }
    function loadCollection() { /* same */ }
    function removeCard(index) { /* same */ }
    async function startCamera() { /* same */ }
    function takePhoto() { /* same */ }

    function showTab(tab) {
      document.querySelectorAll('.tab').forEach(t => t.classList.add('hidden'));
      const tabEl = document.getElementById(tab + 'Tab');
      if (tabEl) tabEl.classList.remove('hidden');

      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active', 'text-yellow-400'));
      const activeBtn = Array.from(document.querySelectorAll('.tab-btn')).find(b => b.getAttribute('onclick').includes(tab));
      if (activeBtn) activeBtn.classList.add('active', 'text-yellow-400');

      if (tab === 'sets') renderMasterSets();
      if (tab === 'profile') {
        document.getElementById('trainerName').value = currentUser;
        document.getElementById('bio').value = bio;
      }
    }

    function logout() {
      if (confirm("Logout?")) location.reload();
    }

    // Load saved data
    window.onload = () => {
      currentUser = localStorage.getItem('trainerName') || "Trainer";
      bio = localStorage.getItem('bio') || "Aspiring Pokémon Master collecting all the cards!";
      
      updateProfileHeader();
      loadCollection();
      showTab('search');   // start on search tab
    };
  </script>
</body>
</html>
