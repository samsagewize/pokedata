<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PokeData • Pokédex</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: system-ui, sans-serif; }
    .pokedex-closed {
      transition: all 0.8s cubic-bezier(0.68, -0.55, 0.27, 1.55);
    }
    .pokedex-open {
      transform: scale(1) rotate(0deg);
    }
    .pokemon-sprite { width: 90px; height: 90px; object-fit: contain; transition: all 0.4s; }
    .pokemon-sprite:hover { transform: scale(1.2) rotate(10deg); }
    .set-badge { transition: all 0.3s; cursor: pointer; }
    .set-badge.mastered { background-color: #facc15; color: black; box-shadow: 0 0 25px #facc15; transform: scale(1.08); }
    .card-img { transition: transform 0.3s; }
    .card-img:hover { transform: scale(1.08); }
  </style>
</head>
<body class="bg-black text-white min-h-screen overflow-hidden">

  <!-- Pokédex Opening Screen -->
  <div id="pokedexStart" class="flex items-center justify-center min-h-screen bg-gradient-to-br from-red-900 via-black to-red-950">
    <div class="text-center">
      <div id="pokedexCase" class="pokedex-closed mx-auto w-80 h-80 bg-red-600 rounded-3xl border-8 border-yellow-400 shadow-2xl flex flex-col items-center justify-center relative overflow-hidden">
        
        <!-- Pokédex Top -->
        <div class="absolute top-6 w-40 h-8 bg-black rounded-full"></div>
        
        <!-- Screen Area -->
        <div class="mt-16 w-52 h-52 bg-black rounded-2xl border-4 border-yellow-300 flex items-center justify-center relative">
          <div class="text-center">
            <div class="text-6xl mb-4">📟</div>
            <p class="text-yellow-300 font-mono text-xl tracking-widest">POKÉDEX</p>
          </div>
        </div>

        <!-- Bottom Lights -->
        <div class="absolute bottom-8 flex gap-6">
          <div class="w-6 h-6 bg-green-400 rounded-full shadow-lg shadow-green-400 animate-pulse"></div>
          <div class="w-6 h-6 bg-yellow-400 rounded-full shadow-lg shadow-yellow-400"></div>
        </div>
      </div>

      <button onclick="openPokedex()" 
        class="mt-12 px-12 py-5 bg-yellow-400 text-black font-bold text-2xl rounded-3xl hover:bg-yellow-300 transition shadow-xl">
        OPEN POKÉDEX
      </button>
      
      <p class="mt-6 text-gray-400 text-sm">v1.0 • Trainer Edition</p>
    </div>
  </div>

  <!-- Main App Content (hidden until pokedex opens) -->
  <div id="mainContent" class="hidden">

    <!-- Header -->
    <header class="flex justify-between items-center p-4 bg-black/70 backdrop-blur-md border-b border-yellow-400/30">
      <div class="flex items-center gap-4">
        <div id="profileAvatar" class="w-14 h-14 bg-gray-800 rounded-2xl flex items-center justify-center overflow-hidden border-4 border-yellow-400"></div>
        <div>
          <h1 id="trainerNameHeader" class="text-3xl font-bold text-yellow-400">Trainer</h1>
          <p id="welcomeText" class="text-sm text-gray-400">Welcome back!</p>
        </div>
      </div>
      <button onclick="logout()" class="px-6 py-2 bg-red-600 hover:bg-red-700 rounded-2xl text-sm">Logout</button>
    </header>

    <!-- Tabs -->
    <div class="flex gap-2 p-4 border-b border-gray-700 overflow-x-auto bg-black/50">
      <button onclick="showTab('search')" class="tab-btn active px-6 py-3 font-medium">Search</button>
      <button onclick="showTab('camera')" class="tab-btn px-6 py-3 font-medium">📸 Scan</button>
      <button onclick="showTab('collection')" class="tab-btn px-6 py-3 font-medium">Collection</button>
      <button onclick="showTab('sets')" class="tab-btn px-6 py-3 font-medium">Master Sets</button>
      <button onclick="showTab('profile')" class="tab-btn px-6 py-3 font-medium">Profile</button>
    </div>

    <!-- Profile Tab -->
    <div id="profileTab" class="tab hidden p-6">
      <div class="max-w-2xl mx-auto bg-gray-900 p-10 rounded-3xl">
        <h2 class="text-3xl font-bold mb-8 text-center">Trainer Profile</h2>
        
        <div class="flex justify-center mb-10">
          <div id="bigAvatar" class="w-40 h-40 bg-gray-800 rounded-3xl flex items-center justify-center border-8 border-yellow-400 overflow-hidden"></div>
        </div>

        <input id="trainerName" type="text" placeholder="Trainer Name" 
          class="w-full p-5 rounded-3xl bg-gray-800 text-2xl font-bold text-center mb-6">
        
        <textarea id="bio" rows="4" placeholder="Your bio..." 
          class="w-full p-5 rounded-3xl bg-gray-800 mb-8"></textarea>

        <button onclick="saveProfile()" 
          class="w-full py-6 bg-yellow-400 text-black font-bold text-xl rounded-3xl">Save Profile</button>

        <div class="mt-12">
          <p class="text-center text-gray-400 mb-4">Change Companion</p>
          <div class="grid grid-cols-4 gap-6">
            <div onclick="changeStarter('pikachu')" class="cursor-pointer"><img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/25.png" class="pokemon-sprite mx-auto"></div>
            <div onclick="changeStarter('bulbasaur')" class="cursor-pointer"><img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/1.png" class="pokemon-sprite mx-auto"></div>
            <div onclick="changeStarter('charmander')" class="cursor-pointer"><img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/4.png" class="pokemon-sprite mx-auto"></div>
            <div onclick="changeStarter('squirtle')" class="cursor-pointer"><img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/7.png" class="pokemon-sprite mx-auto"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Master Sets Tab -->
    <div id="setsTab" class="tab hidden p-6">
      <h2 class="text-3xl font-bold mb-4">Master Sets 🏆</h2>
      <p class="text-gray-400 mb-8">Click a set when you master it!</p>
      <div id="setsContainer" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6"></div>
    </div>

    <!-- Search Tab -->
    <div id="searchTab" class="tab p-6">
      <input id="searchInput" type="text" placeholder="Search Pokémon card..." 
        class="w-full p-5 rounded-3xl bg-gray-900 text-lg mb-4" onkeyup="if(event.key==='Enter') searchCards()">
      <button onclick="searchCards()" class="px-10 py-4 bg-yellow-400 text-black font-bold rounded-3xl">Search</button>
      <div id="searchResults" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-5 gap-6 mt-10"></div>
    </div>

    <!-- Camera Tab -->
    <div id="cameraTab" class="tab hidden p-6">
      <div class="bg-black rounded-3xl overflow-hidden">
        <video id="video" autoplay playsinline class="w-full max-h-96"></video>
      </div>
      <button onclick="takePhoto()" class="mt-6 w-full py-8 bg-green-500 text-black font-bold text-2xl rounded-3xl">📸 Take Picture</button>
      <div id="scanResult" class="mt-8"></div>
    </div>

    <!-- Collection Tab -->
    <div id="collectionTab" class="tab hidden p-6">
      <h2 class="text-2xl font-bold mb-6">My Collection <span id="collectionCount" class="text-sm bg-gray-800 px-3 py-1 rounded-full"></span></h2>
      <div id="myCollection" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-5 gap-6"></div>
    </div>
  </div>

  <script>
    // Data
    let currentUser = localStorage.getItem('trainerName') || "Trainer";
    let bio = localStorage.getItem('bio') || "Aspiring Pokémon Master!";
    let selectedStarter = localStorage.getItem('starterSprite') || null;
    let myCards = JSON.parse(localStorage.getItem('myPokemonCards') || '[]');
    let masteredSets = JSON.parse(localStorage.getItem('masteredSets') || '[]');

    const starters = {
      pikachu: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/25.png",
      bulbasaur: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/1.png",
      charmander: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/4.png",
      squirtle: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/7.png"
    };

    const allSets = [
      {id: "sv-base", name: "Scarlet & Violet", era: "SV"},
      {id: "sv-pe", name: "Paldea Evolved", era: "SV"},
      {id: "sv-151", name: "Scarlet & Violet 151", era: "SV"},
      {id: "sv-pf", name: "Paldean Fates", era: "SV"},
      {id: "sv-tm", name: "Twilight Masquerade", era: "SV"},
      {id: "sv-sc", name: "Stellar Crown", era: "SV"},
      {id: "sv-pev", name: "Prismatic Evolutions", era: "SV"},
      {id: "swsh-es", name: "Evolving Skies", era: "SWSH"},
      {id: "swsh-br", name: "Brilliant Stars", era: "SWSH"},
      {id: "sm-hf", name: "Hidden Fates", era: "SM"},
      {id: "base", name: "Base Set", era: "Original"}
    ];

    // Open Pokédex Animation
    function openPokedex() {
      const pokedex = document.getElementById('pokedexCase');
      pokedex.classList.add('pokedex-open');
      
      setTimeout(() => {
        document.getElementById('pokedexStart').classList.add('hidden');
        document.getElementById('mainContent').classList.remove('hidden');
        
        if (!selectedStarter) {
          // Show starter selection inside profile on first visit
          showTab('profile');
        } else {
          showTab('search');
          updateProfileHeader();
        }
      }, 800);
    }

    function updateProfileHeader() {
      document.getElementById('trainerNameHeader').textContent = currentUser;
      document.getElementById('welcomeText').textContent = bio.length > 50 ? bio.substring(0, 47) + "..." : bio;
      
      const avatarHTML = `<img src="${starters[selectedStarter]}" class="w-full h-full object-contain p-1">`;
      document.getElementById('profileAvatar').innerHTML = avatarHTML;
      document.getElementById('bigAvatar').innerHTML = avatarHTML;
    }

    function saveProfile() {
      currentUser = document.getElementById('trainerName').value.trim() || "Trainer";
      bio = document.getElementById('bio').value.trim() || "Aspiring Pokémon Master!";
      localStorage.setItem('trainerName', currentUser);
      localStorage.setItem('bio', bio);
      updateProfileHeader();
      alert("Profile Saved! 🎉");
    }

    function changeStarter(key) {
      selectedStarter = key;
      localStorage.setItem('starterSprite', key);
      updateProfileHeader();
    }

    function renderMasterSets() {
      const container = document.getElementById('setsContainer');
      container.innerHTML = '';
      allSets.forEach(set => {
        const isMastered = masteredSets.includes(set.id);
        const div = document.createElement('div');
        div.className = `set-badge p-6 bg-gray-900 rounded-3xl text-center ${isMastered ? 'mastered' : ''}`;
        div.innerHTML = `<div class="text-5xl mb-3">🏆</div><p class="font-bold">${set.name}</p><p class="text-xs text-gray-400">${set.era}</p>`;
        div.onclick = () => {
          if (!masteredSets.includes(set.id)) {
            masteredSets.push(set.id);
            localStorage.setItem('masteredSets', JSON.stringify(masteredSets));
            renderMasterSets();
            createConfetti();
          }
        };
        container.appendChild(div);
      });
    }

    function createConfetti() {
      for (let i = 0; i < 50; i++) {
        setTimeout(() => {
          const c = document.createElement('div');
          c.textContent = '⭐';
          c.style.position = 'fixed';
          c.style.left = Math.random() * 100 + 'vw';
          c.style.top = '-30px';
          c.style.fontSize = '24px';
          c.style.zIndex = 9999;
          document.body.appendChild(c);
          setTimeout(() => { c.style.transition = 'all 4s'; c.style.transform = `translateY(120vh)`; c.style.opacity = 0; }, 100);
          setTimeout(() => c.remove(), 5000);
        }, i * 10);
      }
    }

    function showTab(tab) {
      document.querySelectorAll('.tab').forEach(t => t.classList.add('hidden'));
      const activeTab = document.getElementById(tab + 'Tab');
      if (activeTab) activeTab.classList.remove('hidden');

      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active', 'text-yellow-400'));
      const btn = Array.from(document.querySelectorAll('.tab-btn')).find(b => b.getAttribute('onclick').includes(tab));
      if (btn) btn.classList.add('active', 'text-yellow-400');

      if (tab === 'sets') renderMasterSets();
      if (tab === 'profile') {
        document.getElementById('trainerName').value = currentUser;
        document.getElementById('bio').value = bio;
      }
    }

    // Placeholder functions (add your previous search/camera/collection code here if needed)
    async function searchCards() {
      alert("Search feature ready! (You can expand this later)");
    }
    function takePhoto() {
      alert("Camera ready! Point at a card and take photo.");
    }
    function loadCollection() {
      document.getElementById('collectionCount').textContent = myCards.length + " cards";
    }

    function logout() {
      if (confirm("Close Pokédex and restart?")) location.reload();
    }

    // Start the app
    window.onload = () => {
      loadCollection();
    };
  </script>
</body>
</html>
