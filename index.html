<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PokeData • Pokédex</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: system-ui, sans-serif; }
    .pokedex-closed { transition: all 0.8s cubic-bezier(0.68, -0.55, 0.27, 1.55); }
    .pokemon-sprite { width: 80px; height: 80px; object-fit: contain; transition: all 0.3s; }
    .grayscale { filter: grayscale(100%); }
    .card-img { transition: transform 0.3s; }
    .card-img:hover { transform: scale(1.08); }
    .set-badge { transition: all 0.3s; cursor: pointer; }
    .set-badge:hover { transform: scale(1.05); }
    .set-badge.mastered { background-color: #facc15; color: black; box-shadow: 0 0 25px #facc15; }
  </style>
</head>
<body class="bg-black text-white min-h-screen overflow-hidden">

  <!-- Pokédex Opening -->
  <div id="pokedexStart" class="flex items-center justify-center min-h-screen bg-gradient-to-br from-red-900 via-black to-red-950">
    <div class="text-center">
      <div id="pokedexCase" class="pokedex-closed mx-auto w-80 h-80 bg-red-600 rounded-3xl border-8 border-yellow-400 shadow-2xl flex flex-col items-center justify-center relative overflow-hidden">
        <div class="absolute top-6 w-40 h-8 bg-black rounded-full"></div>
        <div class="mt-16 w-52 h-52 bg-black rounded-2xl border-4 border-yellow-300 flex items-center justify-center">
          <div class="text-center">
            <div class="text-6xl mb-4">📟</div>
            <p class="text-yellow-300 font-mono text-xl tracking-widest">POKÉDEX</p>
          </div>
        </div>
        <div class="absolute bottom-8 flex gap-6">
          <div class="w-6 h-6 bg-green-400 rounded-full shadow-lg shadow-green-400 animate-pulse"></div>
          <div class="w-6 h-6 bg-yellow-400 rounded-full shadow-lg shadow-yellow-400"></div>
        </div>
      </div>
      <button onclick="openPokedex()" class="mt-12 px-12 py-5 bg-yellow-400 text-black font-bold text-2xl rounded-3xl hover:bg-yellow-300">OPEN POKÉDEX</button>
    </div>
  </div>

  <!-- Main App -->
  <div id="mainContent" class="hidden">

    <!-- Header -->
    <header class="flex justify-between items-center p-4 bg-black/70 backdrop-blur border-b border-yellow-400/30">
      <div class="flex items-center gap-4">
        <div id="profileAvatar" class="w-14 h-14 bg-gray-800 rounded-2xl flex items-center justify-center overflow-hidden border-4 border-yellow-400"></div>
        <div>
          <h1 id="trainerNameHeader" class="text-3xl font-bold text-yellow-400">Trainer</h1>
          <p id="welcomeText" class="text-sm text-gray-400"></p>
        </div>
      </div>
      <button onclick="logout()" class="px-6 py-2 bg-red-600 rounded-2xl">Logout</button>
    </header>

    <!-- Tabs -->
    <div class="flex gap-2 p-4 border-b border-gray-700 overflow-x-auto bg-black/50">
      <button onclick="showTab('search')" class="tab-btn active px-6 py-3">Search</button>
      <button onclick="showTab('camera')" class="tab-btn px-6 py-3">📸 Scan</button>
      <button onclick="showTab('collection')" class="tab-btn px-6 py-3">Collection</button>
      <button onclick="showTab('sets')" class="tab-btn px-6 py-3">Master Sets</button>
      <button onclick="showTab('profile')" class="tab-btn px-6 py-3">Profile</button>
    </div>

    <!-- Master Sets List -->
    <div id="setsTab" class="tab p-6">
      <h2 class="text-3xl font-bold mb-6">Master Sets 🏆</h2>
      <div id="setsContainer" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6"></div>
    </div>

    <!-- Set Detail View (hidden by default) -->
    <div id="setDetailView" class="tab hidden p-6">
      <button onclick="closeSetDetail()" class="mb-6 text-yellow-400 hover:underline">← Back to Master Sets</button>
      <h2 id="detailSetName" class="text-3xl font-bold mb-2"></h2>
      <p id="detailSetEra" class="text-gray-400 mb-8"></p>
      
      <div id="setCardsGrid" class="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-5 lg:grid-cols-6 gap-6"></div>
    </div>

    <!-- Other tabs (Profile, Search, Camera, Collection) - simplified for brevity -->
    <div id="profileTab" class="tab hidden p-6">
      <div class="max-w-2xl mx-auto bg-gray-900 p-10 rounded-3xl">
        <h2 class="text-3xl font-bold mb-8 text-center">Trainer Profile</h2>
        <div class="flex justify-center mb-10">
          <div id="bigAvatar" class="w-40 h-40 bg-gray-800 rounded-3xl border-8 border-yellow-400 overflow-hidden"></div>
        </div>
        <input id="trainerName" class="w-full p-5 rounded-3xl bg-gray-800 text-2xl font-bold text-center mb-6">
        <textarea id="bio" rows="4" class="w-full p-5 rounded-3xl bg-gray-800 mb-8"></textarea>
        <button onclick="saveProfile()" class="w-full py-6 bg-yellow-400 text-black font-bold text-xl rounded-3xl">Save Profile</button>
      </div>
    </div>

    <div id="searchTab" class="tab p-6"> <!-- Search content same as before --> </div>
    <div id="cameraTab" class="tab hidden p-6"> <!-- Camera content same as before --> </div>
    <div id="collectionTab" class="tab hidden p-6"> <!-- Collection content same as before --> </div>
  </div>

  <script>
    // Data
    let currentUser = localStorage.getItem('trainerName') || "Trainer";
    let bio = localStorage.getItem('bio') || "Aspiring Pokémon Master!";
    let selectedStarter = localStorage.getItem('starterSprite') || 'pikachu';
    let myCards = JSON.parse(localStorage.getItem('myPokemonCards') || '[]'); // {id, name, image}
    let masteredSets = JSON.parse(localStorage.getItem('masteredSets') || '[]');

    const starters = { /* same as before */ };

    // Demo sets with some sample cards for visual demo (in real app you'd fetch from API)
    const allSets = [
      { id: "sv151", name: "Scarlet & Violet 151", era: "SV", total: 165,
        cards: [
          {id: "sv3pt5-1", name: "Bulbasaur", sprite: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/1.png", cardImage: "https://images.pokemontcg.io/sv3pt5/1.png"},
          {id: "sv3pt5-4", name: "Charmander", sprite: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/4.png", cardImage: "https://images.pokemontcg.io/sv3pt5/4.png"},
          {id: "sv3pt5-7", name: "Squirtle", sprite: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/7.png", cardImage: "https://images.pokemontcg.io/sv3pt5/7.png"},
          {id: "sv3pt5-25", name: "Pikachu", sprite: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/25.png", cardImage: "https://images.pokemontcg.io/sv3pt5/25.png"}
        ]
      },
      { id: "swsh-es", name: "Evolving Skies", era: "SWSH", total: 237, cards: [] /* add more if wanted */ },
      { id: "base1", name: "Base Set", era: "Original", total: 102, cards: [] }
    ];

    function openPokedex() {
      document.getElementById('pokedexCase').classList.add('scale-110');
      setTimeout(() => {
        document.getElementById('pokedexStart').classList.add('hidden');
        document.getElementById('mainContent').classList.remove('hidden');
        updateProfileHeader();
        showTab('sets'); // start on Master Sets for demo
      }, 600);
    }

    function updateProfileHeader() {
      document.getElementById('trainerNameHeader').textContent = currentUser;
      document.getElementById('welcomeText').textContent = bio.substring(0, 50) + "...";
      const avatarHTML = `<img src="${starters[selectedStarter]}" class="w-full h-full object-contain p-1">`;
      document.getElementById('profileAvatar').innerHTML = avatarHTML;
      document.getElementById('bigAvatar').innerHTML = avatarHTML;
    }

    function saveProfile() { /* same as before */ }

    function showTab(tab) {
      document.querySelectorAll('.tab').forEach(t => t.classList.add('hidden'));
      document.getElementById(tab + 'Tab').classList.remove('hidden');
      if (tab === 'sets') renderMasterSets();
    }

    function renderMasterSets() {
      const container = document.getElementById('setsContainer');
      container.innerHTML = '';
      allSets.forEach(set => {
        const isMastered = masteredSets.includes(set.id);
        const div = document.createElement('div');
        div.className = `set-badge p-6 bg-gray-900 rounded-3xl text-center ${isMastered ? 'mastered' : ''}`;
        div.innerHTML = `
          <div class="text-5xl mb-3">🏆</div>
          <p class="font-bold text-lg">${set.name}</p>
          <p class="text-xs text-gray-400">${set.era} • ${set.total} cards</p>
        `;
        div.onclick = () => showSetDetail(set);
        container.appendChild(div);
      });
    }

    let currentSet = null;

    function showSetDetail(set) {
      currentSet = set;
      document.getElementById('setDetailView').classList.remove('hidden');
      document.getElementById('setsTab').classList.add('hidden');

      document.getElementById('detailSetName').textContent = set.name;
      document.getElementById('detailSetEra').textContent = `${set.era} • ${set.total} cards`;

      const grid = document.getElementById('setCardsGrid');
      grid.innerHTML = '';

      set.cards.forEach(card => {
        const owned = myCards.some(c => c.id === card.id || c.name.toLowerCase() === card.name.toLowerCase());

        const div = document.createElement('div');
        div.className = 'bg-gray-900 rounded-2xl p-4 text-center';
        div.innerHTML = `
          <img src="${card.sprite}" class="pokemon-sprite mx-auto ${owned ? '' : 'grayscale'}">
          <p class="font-medium mt-3 text-sm">${card.name}</p>
          ${owned ? `
            <div class="mt-4">
              <img src="${card.cardImage}" class="card-img w-full rounded-xl mx-auto border border-green-500">
              <p class="text-green-400 text-xs mt-2">✓ Verified • Owned</p>
            </div>
          ` : `
            <button onclick="addMissingCard('${card.id}', '${card.name}', '${card.cardImage}'); event.stopImmediatePropagation()" 
              class="mt-4 text-xs bg-yellow-400 text-black px-4 py-2 rounded-xl w-full">Add this card</button>
          `}
        `;
        grid.appendChild(div);
      });
    }

    function addMissingCard(id, name, image) {
      if (myCards.some(c => c.id === id)) {
        alert("You already have this card!");
        return;
      }
      myCards.push({ id, name, image });
      localStorage.setItem('myPokemonCards', JSON.stringify(myCards));
      alert(`✅ ${name} added to your collection!`);
      showSetDetail(currentSet); // refresh the view
    }

    function closeSetDetail() {
      document.getElementById('setDetailView').classList.add('hidden');
      document.getElementById('setsTab').classList.remove('hidden');
    }

    function logout() {
      if (confirm("Close Pokédex?")) location.reload();
    }

    // Simple placeholders for other tabs
    function searchCards() { alert("Search ready!"); }
    function takePhoto() { alert("Camera ready!"); }

    window.onload = () => {
      updateProfileHeader();
    };
  </script>
</body>
</html>
